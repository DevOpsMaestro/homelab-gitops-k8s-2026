---
name: Validate
on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: v8.30.1
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x64/' | sed 's/aarch64/arm64/')
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION#v}_linux_${ARCH}.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Scan for secrets
        run: |
          gitleaks detect --source . --no-git --redact
        # --no-git scans all files in the working tree as-is (no history traversal).
        # Catches any secret present in the branch right now.
        # --redact replaces matched secret values with REDACTED in CI log output.

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@6a650dba1b4ae9945185c4bb3cc3f386aaf71b3d # v2.9.2

      - name: Validate infrastructure manifests
        run: kustomize build ./infrastructure/controllers

      - name: Validate apps base manifests
        run: |
          for dir in \
              apps/base/prometheus \
              apps/base/grafana \
              apps/base/loki \
              apps/base/promtail \
              apps/base/tempo \
              apps/base/opentelemetry \
              apps/base/kyverno \
              apps/base/demo \
              apps/base/notifications \
              apps/base/istio \
              apps/base/boinc; do
            echo "==> kustomize build $dir"
            kustomize build "$dir"
          done

      - name: Validate kind overlay manifests
        run: kustomize build ./apps/overlays/kind

      - name: Validate cluster entrypoint
        run: kustomize build ./clusters/kind

      - name: Install Kyverno CLI
        env:
          KYVERNO_CLI_VERSION: v1.18.1
        run: |
          ARCH=$(uname -m | sed 's/aarch64/arm64/')
          curl -LO "https://github.com/kyverno/kyverno/releases/download/${KYVERNO_CLI_VERSION}/kyverno-cli_${KYVERNO_CLI_VERSION}_linux_${ARCH}.tar.gz"
          tar -xzf "kyverno-cli_${KYVERNO_CLI_VERSION}_linux_${ARCH}.tar.gz"
          sudo mv kyverno /usr/local/bin/kyverno

      - name: Test Kyverno policies
        run: kyverno test apps/base/kyverno/tests/

      - name: Install Kubescape CLI
        env:
          KUBESCAPE_VERSION: v4.0.9
        run: |
          VERSION_CLEAN="${KUBESCAPE_VERSION#v}"
          ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
          curl -fsSL "https://github.com/kubescape/kubescape/releases/download/${KUBESCAPE_VERSION}/kubescape_${VERSION_CLEAN}_linux_${ARCH}" -o kubescape
          chmod +x kubescape
          sudo mv kubescape /usr/local/bin/kubescape

      - name: Download Kubescape artifacts
        continue-on-error: true
        run: kubescape download artifacts

      - name: Kubescape offline scan (NSA + MITRE)
        run: |
          kubescape scan framework nsa,mitre \
            --format junit \
            --output kubescape-results.xml \
            --compliance-threshold 80 \
            ./infrastructure/ ./apps/

      - name: Upload Kubescape scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kubescape-results
          path: kubescape-results.xml
          if-no-files-found: warn
