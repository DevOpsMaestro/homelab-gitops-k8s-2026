---
# OpenTelemetry Collector — vendor-neutral telemetry pipeline.
#
# Role in the observability stack:
#   Istio Envoy sidecars  → (OTLP gRPC)  → OTel Collector → Tempo  (traces)
#   Instrumented apps     → (OTLP)        → OTel Collector → Tempo  (traces)
#   OTel Collector itself → (/metrics)    → Prometheus              (collector health)
#
# No Istio sidecar: the Collector receives plain-text OTLP from Envoy proxies.
# Pods without sidecars are outside mTLS enforcement, so no PeerAuthentication
# exception is needed — Istio auto-detects the destination has no proxy and
# sends plain text.
#
# Receivers: OTLP gRPC (4317), OTLP HTTP (4318)
# Exporters: Tempo via OTLP gRPC
# Self-metrics: chart's built-in service.telemetry.metrics.readers exposes port 8888;
#               a separate prometheus exporter in the pipeline would collide with it.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry-collector
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: observability
  dependsOn:
    - name: kube-prometheus-stack
      namespace: flux-system
    - name: tempo
      namespace: flux-system
  install:
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.158.x"
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
      interval: 24h
  values:
    mode: deployment

    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.153.0"
      digest: "sha256:93aad750175cbf1a973ae1c5886c3371f4d800f61be25cdd26870b8441ffe9fa"

    podLabels:
      sidecar.istio.io/inject: "false"

    # k8sattributes needs list/watch on pods, namespaces, and replicasets to resolve
    # pod IP → pod metadata and enrich every span with k8s.pod.name,
    # k8s.namespace.name, k8s.deployment.name, etc.
    clusterRole:
      create: true
      rules:
        - apiGroups: [""]
          resources: ["pods", "namespaces"]
          verbs: ["get", "watch", "list"]
        - apiGroups: ["apps"]
          resources: ["replicasets"]
          verbs: ["get", "watch", "list"]

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Expose only the ports this cluster uses; disable defaults we don't need.
    ports:
      otlp:
        enabled: true
        containerPort: 4317
        servicePort: 4317
        protocol: TCP
        appProtocol: grpc
      otlp-http:
        enabled: true
        containerPort: 4318
        servicePort: 4318
        protocol: TCP
      metrics:
        enabled: true
        containerPort: 8888
        servicePort: 8888
        protocol: TCP
      jaeger-compact:
        enabled: false
      jaeger-thrift:
        enabled: false
      jaeger-grpc:
        enabled: false
      zipkin:
        enabled: false

    config:
      extensions:
        health_check:
          endpoint: 0.0.0.0:13133

      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

      processors:
        # memory_limiter intentionally omitted: chart default uses limit_percentage/spike_limit_percentage
        # which cannot coexist with limit_mib/spike_limit_mib (OTel validates mutual exclusivity).
        # Default: 80% of resources.limits.memory (256Mi) ≈ 205Mi.
        k8s_attributes:
          auth_type: serviceAccount
          passthrough: false
          extract:
            metadata:
              - k8s.pod.name
              - k8s.pod.uid
              - k8s.deployment.name
              - k8s.namespace.name
              - k8s.node.name
              - k8s.pod.start_time
          pod_association:
            # First try the pod IP carried as a resource attribute (set by Istio/Envoy)
            - sources:
                - from: resource_attribute
                  name: k8s.pod.ip
            # Fall back to the incoming connection's source IP
            - sources:
                - from: connection
        batch:
          timeout: 1s
          send_batch_size: 512

      exporters:
        otlp_grpc/tempo:
          endpoint: observability-tempo.observability.svc.cluster.local:4317
          tls:
            insecure: true
          retry_on_failure:
            enabled: true
            initial_interval: 5s
            max_interval: 30s
            max_elapsed_time: 300s
          sending_queue:
            enabled: true
            num_consumers: 4
            queue_size: 100

      service:
        extensions: [health_check]
        pipelines:
          traces:
            receivers: [otlp]
            processors: [memory_limiter, k8s_attributes, batch]
            exporters: [otlp_grpc/tempo]
        telemetry:
          logs:
            level: warn
          # The chart 0.158.x generates the legacy service.telemetry.resource
          # inline map format (host.name: ..., k8s.namespace.name: ...) from its
          # default values. OTel Collector 0.153.0 warns about this format and
          # prefers resource.attributes (array). Adding the attributes array here
          # causes the collector to use the new format; when attributes is non-empty
          # the collector suppresses the legacy-format warning and ignores the
          # chart-injected inline map keys.
          resource:
            attributes:
              - name: host.name
                value: ${env:OTEL_K8S_NODE_NAME}
              - name: k8s.namespace.name
                value: ${env:OTEL_K8S_NAMESPACE}
              - name: k8s.node.ip
                value: ${env:OTEL_K8S_NODE_IP}
              - name: k8s.node.name
                value: ${env:OTEL_K8S_NODE_NAME}
              - name: k8s.pod.ip
                value: ${env:OTEL_K8S_POD_IP}
              - name: k8s.pod.name
                value: ${env:OTEL_K8S_POD_NAME}
