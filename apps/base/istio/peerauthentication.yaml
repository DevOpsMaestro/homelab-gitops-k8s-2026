---
# Mesh-wide mTLS default — PERMISSIVE allows both mTLS and plain text.
# Services inside the mesh (with Envoy sidecars) automatically use mTLS
# with each other. Services outside the mesh (no sidecar) still reach
# mesh services over plain text without errors.
#
# Harden to STRICT once all critical workloads have sidecars:
#   kubectl patch peerauthentication default -n istio-system \
#     --type=merge -p '{"spec":{"mtls":{"mode":"STRICT"}}}'
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: PERMISSIVE
---
# Enforce mTLS for all workloads in the demo namespace.
# The namespace-default cannot carry portLevelMtls; workload-specific
# PeerAuthentications below add the per-port PERMISSIVE exceptions.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: demo
spec:
  mtls:
    mode: STRICT
---
# httpbin: allow plain text on port 80.
# Contour Envoy (no Istio sidecar) routes httpbin-contour.local here and
# sends plain text. All other ports on httpbin remain STRICT.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: httpbin-port-80
  namespace: demo
spec:
  selector:
    matchLabels:
      app: httpbin
  mtls:
    mode: STRICT
  portLevelMtls:
    "80":
      mode: PERMISSIVE
---
# Enforce mTLS for all workloads in the observability namespace.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: observability
spec:
  mtls:
    mode: STRICT
---
# Grafana: allow plain text on port 3000.
# Contour Envoy (no Istio sidecar) routes grafana.local here.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: grafana-port-3000
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  mtls:
    mode: STRICT
  portLevelMtls:
    "3000":
      mode: PERMISSIVE
---
# Loki: allow plain text on port 3100.
# Promtail DaemonSet (sidecar.istio.io/inject: false) pushes logs here.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: loki-port-3100
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  mtls:
    mode: STRICT
  portLevelMtls:
    "3100":
      mode: PERMISSIVE
---
# Prometheus: allow plain text on port 9090.
# Contour Envoy (no Istio sidecar) routes prometheus.local here and sends
# plain text. All other ports on Prometheus remain STRICT.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: prometheus-port-9090
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  mtls:
    mode: STRICT
  portLevelMtls:
    "9090":
      mode: PERMISSIVE
---
# Alertmanager: allow plain text on port 9093.
# Prometheus operator configures Prometheus to send alerts to Alertmanager
# via the headless alertmanager-operated service (resolves to pod IPs).
# Istio auto-mTLS does not reliably upgrade headless-service pod-IP connections,
# so Prometheus's sidecar falls back to plain HTTP and STRICT mode returns 503.
# PERMISSIVE on this port unblocks alert delivery while the namespace default
# remains STRICT for all other traffic.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: alertmanager-port-9093
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  mtls:
    mode: STRICT
  portLevelMtls:
    "9093":
      mode: PERMISSIVE
---
# Prometheus Operator admission webhook: disable Istio mTLS on port 10250.
# The Kubernetes API server (no Istio sidecar) connects here with its own
# CA-signed TLS certificate. STRICT mode causes TLS handshake failures because
# the API server sends plain TLS, not Istio mTLS. DISABLE tells the sidecar
# to pass the connection through unchanged so the webhook's own TLS cert
# handles authentication — no security regression, just a different TLS root.
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: prometheus-operator-webhook-port-10250
  namespace: observability
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-prometheus-stack-prometheus-operator
  mtls:
    mode: STRICT
  portLevelMtls:
    "10250":
      mode: DISABLE
