---
# BOINC is a pure compute client — it initiates connections to project servers
# but never listens for inbound connections. Default-deny covers all pods in this
# namespace; the egress policy below then allows only what BOINC actually needs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: boinc
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: boinc-egress
  namespace: boinc
spec:
  podSelector:
    matchLabels:
      app: boinc
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow outbound to BOINC project servers (Rosetta@Home and similar)
    - ports:
        - port: 80
          protocol: TCP
        - port: 443
          protocol: TCP
