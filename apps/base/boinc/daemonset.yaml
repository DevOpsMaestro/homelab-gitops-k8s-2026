---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: boinc
  namespace: boinc
  labels:
    app: boinc
spec:
  selector:
    matchLabels:
      app: boinc
  template:
    metadata:
      labels:
        app: boinc
    spec:
      hostPID: true
      initContainers:
        - name: boinc-account-init
          image: busybox:1.38
          command:
            - sh
            - -c
            - |
              cp -n /boinc-account-init/account_boinc.bakerlab.org_rosetta.xml \
                     /var/lib/boinc/account_boinc.bakerlab.org_rosetta.xml
              cp -n /boinc-account-init/account_einstein.phys.uwm.edu.xml \
                     /var/lib/boinc/account_einstein.phys.uwm.edu.xml
              cp /boinc-prefs-override/global_prefs_override.xml \
                 /var/lib/boinc/global_prefs_override.xml
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: boinc-data
              mountPath: /var/lib/boinc
            - name: boinc-projects
              mountPath: /boinc-account-init
              readOnly: true
            - name: boinc-prefs-override
              mountPath: /boinc-prefs-override
              readOnly: true
      containers:
        - name: boinc
          image: boinc/client:arm64v8
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: BOINC_GUI_RPC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: boinc-projects-secret
                  key: gui-rpc-password
            - name: BOINC_CMD_LINE_OPTIONS
              value: "--allow_remote_gui_rpc"
          ports:
            - name: rpc
              containerPort: 31416
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 950m
              memory: 2Gi
          volumeMounts:
            - name: boinc-data
              mountPath: /var/lib/boinc
      volumes:
        - name: boinc-data
          hostPath:
            path: /var/lib/boinc
            type: DirectoryOrCreate
        - name: boinc-projects
          secret:
            secretName: boinc-projects-secret
        - name: boinc-prefs-override
          configMap:
            name: boinc-global-prefs-override
