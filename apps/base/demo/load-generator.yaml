apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: demo
  labels:
    app.kubernetes.io/name: load-generator
    app.kubernetes.io/component: generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
        version: v1
        app.kubernetes.io/name: load-generator
        app.kubernetes.io/component: generator
        app.kubernetes.io/part-of: demo
    spec:
      automountServiceAccountToken: false
      containers:
        - name: curl
          image: curlimages/curl:8.21.0
          # Send a mix of GET and POST requests every 5 seconds so the Istio
          # mesh/service/workload dashboards have meaningful HTTP traffic to show.
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                curl -sf http://httpbin/get        -o /dev/null
                curl -sf http://httpbin/status/200 -o /dev/null
                curl -sf http://httpbin/status/404 -o /dev/null
                sleep 5
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            exec:
              command: ["sh", "-c", "command -v curl"]
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 20m
              memory: 16Mi
      volumes:
        - name: tmp
          emptyDir: {}
