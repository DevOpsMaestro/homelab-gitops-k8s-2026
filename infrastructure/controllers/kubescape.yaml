---
apiVersion: v1
kind: Namespace
metadata:
  name: kubescape
  labels:
    istio-injection: disabled
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubescape
  namespace: flux-system
spec:
  interval: 1h
  chart:
    spec:
      chart: kubescape-operator
      version: "1.40.x"
      sourceRef:
        kind: HelmRepository
        name: kubescape
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: cilium
      namespace: flux-system
  targetNamespace: kubescape
  values:
    clusterName: flux-kind
    capabilities:
      configurationScan: enable
      continuousScan: enable
      prometheusExporter: enable
      vulnerabilityScan: disable
      nodeScan: disable
      nodeSbomGeneration: disable
      relevancy: disable
      runtimeObservability: disable
      networkPolicyService: disable
      networkEventsStreaming: disable
      nodeProfileService: disable
      admissionController: disable
      httpDetection: disable
      seccompProfileService: disable
      # Run without an ARMO cloud account. When disabled (the default), the
      # operator attempts to submit scan results to api.armosec.io and logs a
      # 400 "missing account id" error on every scan cycle because no account
      # or accessKey is configured. Enable offline mode to suppress this.
      kubescapeOffline: enable
    configurations:
      prometheusAnnotations: disable
  # The chart mounts an emptyDir at /home/nonroot/.kubescape/config.json via
  # subPath: config.json. Kubernetes pre-creates the subPath as a directory
  # inside the emptyDir, so the process sees a directory instead of a file and
  # every scan fails. Replace the volume with a ConfigMap that has a
  # config.json key so the mount produces a regular file.
  #
  # The patch uses RFC 6902 format (op: replace) rather than a strategic merge
  # patch because the SMP $patch: replace directive is silently ignored by the
  # Kustomize version bundled in Flux — it merges configMap onto the existing
  # volume entry and keeps the emptyDir field. The RFC 6902 op replaces the
  # entire element at the specified path index with no ambiguity.
  # Index 0 is stable for this chart: kubescape-volume is always the first
  # volume in the chart-generated Deployment spec.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: kubescape
            patch: |
              - op: replace
                path: /spec/template/spec/volumes/0
                value:
                  name: kubescape-volume
                  configMap:
                    name: kubescape-config
                    items:
                      - key: config.json
                        path: config.json
---
# Provides the config.json file that the kubescape scanner reads at startup.
# The chart generates an emptyDir for this volume; see the postRenderers patch
# above for why a ConfigMap is used instead.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubescape-config
  namespace: kubescape
data:
  config.json: "{}"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Kubescape reads all resources across every namespace for posture scanning.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
---
# Kubescape connects to ARMO cloud to pull compliance frameworks and upload scan
# results. Allow HTTPS egress cluster-wide; no practical destination restriction.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Prometheus scrapes Kubescape metrics on port 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubescape-allow-prometheus-scrape-ingress
  namespace: kubescape
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 8080
---
# The kube-apiserver reaches the storage aggregated APIService from the
# control-plane host network. Because the storage pod runs on a different node,
# this is cross-node host traffic. Standard Kubernetes NetworkPolicy ipBlock
# rules are not enforced by Cilium for host-to-pod cross-node traffic.
# A CiliumNetworkPolicy with fromEntities is required:
#   - kube-apiserver: the Kubernetes API server specifically (Cilium 1.12+)
#   - remote-node: all host-network processes on other cluster nodes
# Port 8443 is the container port; the Service maps 443 → 8443.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-storage-ingress
  namespace: kubescape
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: storage
      app.kubernetes.io/name: kubescape-operator
  ingress:
    - fromEntities:
        - kube-apiserver
        - remote-node
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
