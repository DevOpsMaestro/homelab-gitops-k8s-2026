---
# envoy-ingress holds only the nginx nodeport-proxy DaemonSet (KinD port-mapping shim).
# Contour handles all HTTP ingress; the nginx proxy forwards requests to Contour's Envoy
# DaemonSet (contour-contour-envoy.contour). TCP traffic (iperf3) is forwarded directly
# to the iperf3 Service without an intermediate ingress controller.
# Injection disabled: the nginx proxy has no reason to join the Istio mesh.
apiVersion: v1
kind: Namespace
metadata:
  name: envoy-ingress
  labels:
    istio-injection: disabled
---
# ── envoy-ingress (nginx nodeport-proxy DaemonSet only) ──────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# External HTTP and TCP traffic arrives via KinD extraPortMappings.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-ingress
  namespace: envoy-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
        - port: 8443
