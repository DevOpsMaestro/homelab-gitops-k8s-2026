---
apiVersion: v1
kind: Namespace
metadata:
  name: kyverno
  labels:
    istio-injection: disabled
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: flux-system
spec:
  interval: 1h
  driftDetection:
    mode: enabled
  targetNamespace: kyverno
  dependsOn:
    - name: cilium
      namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: kyverno
      version: "3.x"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 24h
  values:
    # Single replica per component — KinD resource optimisation.
    # Scale to 3 for HA in production.
    #
    # Log verbosity: Kyverno uses klog integers (--v flag). 1 shows warnings and
    # errors; 2 is the default (info); 3+ adds debug output.
    admissionController:
      replicas: 1
      extraArgs:
        v: "1"
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    backgroundController:
      replicas: 1
      extraArgs:
        v: "1"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
    cleanupController:
      replicas: 1
      extraArgs:
        v: "1"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi
    reportsController:
      replicas: 1
      extraArgs:
        v: "1"
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

    # Globally exclude system and infrastructure namespaces at the webhook level.
    # Kyverno will not receive admission events for these at all, which is more
    # efficient than per-policy exclusions and guarantees no accidental enforcement.
    # Namespaces that need partial coverage (tetragon, openebs, observability,
    # envoy-ingress) are excluded only in the specific policies they would violate.
    config:
      resourceFilters:
        - '[*,kube-system,*]'
        - '[*,kube-public,*]'
        - '[*,kube-node-lease,*]'
        - '[*,flux-system,*]'
        - '[*,istio-system,*]'
        - '[*,cert-manager,*]'
        - '[*,kyverno,*]'
        - '[*,local-path-storage,*]'

    # Ignore means the API server allows the request if Kyverno is unavailable.
    # Safe for initial rollout on a single-node KinD setup. Change to Fail only
    # after Kyverno is HA (replicas: 3) and proven stable across a full restart.
    webhooksFailurePolicy: Ignore

    # Enable PolicyException CRD support. Required for the Falco event-generator
    # test Job, which must run as root (allowPrivilegeEscalation: true) to trigger
    # Falco syscall rules, while the disallow-privilege-escalation ClusterPolicy
    # is in Enforce mode. The exception is scoped to the falco-test namespace only.
    features:
      policyExceptions:
        enabled: true
        namespace: falco-test
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: kyverno
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: kyverno
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: kyverno
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
---
# Kyverno controllers communicate internally (admission controller ↔ background
# controller ↔ cleanup controller ↔ reports controller).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: kyverno
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# The Kubernetes API server calls the Kyverno admission webhook on port 9443.
# The API server has no namespace, so we cannot use namespaceSelector; omitting
# the `from` field allows ingress from any source (including the API server).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyverno-allow-webhook-ingress
  namespace: kyverno
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 9443
---
# Prometheus (in observability) scrapes Kyverno metrics on port 8000.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyverno-allow-prometheus-scrape-ingress
  namespace: kyverno
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 8000
