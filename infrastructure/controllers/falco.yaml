---
# Falco is a CNCF-graduated runtime security tool that monitors all syscalls
# via eBPF and alerts on anomalous container behaviour: shell spawning, sensitive
# file reads, unexpected network connections, and Kubernetes API abuse.
#
# Role in the security stack:
#   Kyverno  — admission control (blocks misconfig before pods start)
#   Tetragon — eBPF enforcement (kills processes, blocks syscalls at runtime)
#   Falco    — runtime detection (continuous behavioural audit, alerts to Loki)
#
# Driver: modern_ebpf is the only viable option for KinD. KinD nodes are Docker
# containers — kernel module loading is impossible. The legacy eBPF driver is
# deprecated as of Falco 0.38. modern_ebpf is bundled in the Falco binary (no
# init container required), uses CO-RE (Compile Once, Run Everywhere), and needs
# only kernel ≥5.8 with BTF support — satisfied by all modern KinD hosts.
#
# Injection disabled: Falco is a low-level eBPF agent, not a mesh workload.
apiVersion: v1
kind: Namespace
metadata:
  name: falco
  labels:
    istio-injection: disabled
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: flux-system
spec:
  interval: 1h
  driftDetection:
    mode: enabled
  targetNamespace: falco
  dependsOn:
    - name: cilium
      namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: falco
      version: "9.x"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
      interval: 24h
  values:
    # ── Driver ───────────────────────────────────────────────────────────────────
    driver:
      kind: modern_ebpf

    # Ensures log output is flushed immediately rather than held in a line buffer.
    tty: true

    # ── Prometheus metrics ────────────────────────────────────────────────────────
    # ServiceMonitor CRD (monitoring.coreos.com/v1) lives in the apps layer which
    # depends on this infrastructure layer — circular dependency. Falco metrics are
    # scraped via additionalScrapeConfigs in apps/base/prometheus/helmrelease.yaml.
    metrics:
      enabled: true
      interval: 1m
      output_rule: true
      rules_counters_enabled: true
      resource_utilization_enabled: true
      kernel_event_counters_enabled: true

    webserver:
      enabled: true
      prometheus_metrics_enabled: true
      port: 8765

    # ── Resources — Single node KinD ─────────────────────────────────────────────
    # Scale requests/limits for production HA clusters.
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # ── Falcosidekick — alert routing to Loki ────────────────────────────────────
    # Falco's native outputs are stdout/file/gRPC. Falcosidekick is the official
    # proxy that routes alerts to 50+ destinations. Enabled here to forward
    # structured JSON alerts into Loki for Grafana querying.
    # falcoctl manages Falco rule artifacts: the install init container downloads
    # rules at startup; the follow sidecar watches for updates while running.
    # Both need resource limits to satisfy the require-resource-limits policy.
    falcoctl:
      artifact:
        install:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
        follow:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

    falcosidekick:
      enabled: true
      # Single replica — KinD resource optimisation. Scale to 2+ for HA in production.
      replicaCount: 1
      config:
        loki:
          hostport: "http://observability-loki.observability.svc.cluster.local:3100"
          tenant: ""
          format: json
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi

    # ── Operational log level ─────────────────────────────────────────────────────
    # Suppresses Falco's own info/notice startup messages. Does NOT affect security
    # alert output (minimum_priority controls which rule priorities are forwarded).
    log_level: warning

    # ── Custom rule overrides ─────────────────────────────────────────────────────
    customRules:
      cilium-exceptions.yaml: |-
        # Cilium's mount-cgroup and apply-sysctl-overwrites init containers execute
        # cilium-mount and cilium-sysctlfix from writable overlay layers at every pod
        # restart. These are expected privileged init-container operations, not attacks.
        - rule: Drop and execute new binary in container
          override:
            exceptions: append
          exceptions:
            - name: cilium_init_containers
              fields: [container.name]
              comps: [in]
              values:
                - [mount-cgroup]
                - [apply-sysctl-overwrites]
      istio-exceptions.yaml: |-
        # Istio injects a Python health-check sidecar (/app/sidecar.py) in pods
        # that have sidecar injection enabled. The sidecar contacts the Kubernetes
        # API server to check pod readiness, which triggers the
        # "Contact K8S API Server From Container" rule. This is expected behaviour
        # for the Istio control-plane health subsystem, not an attack.
        - rule: Contact K8S API Server From Container
          override:
            exceptions: append
          exceptions:
            - name: istio_sidecar_health_check
              fields: [proc.cmdline]
              comps: [startswith]
              values:
                - ["python -u /app/sidecar.py"]
      prometheus-exceptions.yaml: |-
        # Prometheus scrapes Kubernetes API server metrics via the aggregation
        # layer (metrics.k8s.io, custom.metrics.k8s.io). These connections from
        # the /usr/bin/prometheus process are expected scrape activity, not
        # an attack. The process runs inside the Prometheus StatefulSet pod.
        - rule: Contact K8S API Server From Container
          override:
            exceptions: append
          exceptions:
            - name: prometheus_api_scrape
              fields: [proc.exepath]
              comps: [=]
              values:
                - ["/usr/bin/prometheus"]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: falco
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: falco
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: falco
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
---
# falcoctl init/follow sidecars pull Falco rule artifacts from OCI registries
# (ghcr.io/falcosecurity). Allow HTTPS egress for the whole namespace so artifact
# refreshes succeed; there is no practical way to restrict by destination IP here.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-https-egress
  namespace: falco
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
---
# Falco and Falcosidekick pods need to communicate within the namespace:
# Falco → Falcosidekick on port 2801 for alert forwarding.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: falco
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# Prometheus (in observability) scrapes Falco webserver metrics on port 8765.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falco-allow-prometheus-scrape-ingress
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: falco
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 2801
        - port: 8765
---
# Falcosidekick forwards alert events to Loki in the observability namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: falcosidekick-allow-loki-egress
  namespace: falco
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: falcosidekick
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 3100
