---
# Contour and its Envoy data plane both run in the contour namespace.
# Injection disabled: Contour manages its own Envoy proxies via xDS; Istio
# sidecar injection would conflict with the Envoy container lifecycle.
apiVersion: v1
kind: Namespace
metadata:
  name: contour
  labels:
    istio-injection: disabled
---
# Contour is the sole HTTP ingress controller for this cluster. It watches
# the Kubernetes API for HTTPProxy resources, translates them into xDS
# configuration, and streams that configuration to its Envoy DaemonSet via
# gRPC on port 8001. The Envoy DaemonSet is the data plane: it receives xDS
# from Contour and routes live traffic to backend Services.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: contour
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: contour
  dependsOn:
    - name: cilium
      namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: contour
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: projectcontour
        namespace: flux-system
      interval: 24h
  values:
    contour:
      # Suppress info-level controller logs. Valid: trace, debug, info, warn, error.
      logLevel: warn
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      # Disable the chart's built-in NetworkPolicies; this project manages
      # its own NetworkPolicies in contour.yaml using the same pattern as
      # envoy-gateway.yaml (default-deny + explicit allow rules).
      networkPolicy:
        enabled: false
    envoy:
      service:
        type: NodePort
        nodePorts:
          http: 30082
          https: 30444
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      networkPolicy:
        enabled: false
---
# ── contour namespace — controller and Envoy DaemonSet ───────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: contour
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: contour
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Contour controller watches HTTPProxy, Ingress, Service, and Endpoint objects
# cluster-wide via the Kubernetes API server.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-apiserver-egress
  namespace: contour
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 6443
---
# Covers xDS gRPC (Envoy → Contour controller on port 8001) and any other
# intra-namespace communication between Contour and its Envoy DaemonSet.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: contour
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
# The nginx nodeport-proxy (envoy-ingress) uses hostNetwork: true, so its
# traffic arrives from the node IP rather than a pod CIDR. Standard
# NetworkPolicy cannot express "from host entity", so all sources are
# permitted on Envoy's HTTP listen port (8080). Port 8080 is the pod-level
# port; the envoy Service maps port 80 → targetPort 8080.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-envoy-http-ingress
  namespace: contour
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: envoy
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - port: 8080
---
# Contour Envoy pods route HTTP traffic to backend services.
# Pod-level ports: httpbin listens on 80, Grafana on 3000, Prometheus on 9090.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-envoy-egress-to-backends
  namespace: contour
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: envoy
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: demo
      ports:
        - port: 80
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - port: 3000   # Grafana
        - port: 9090   # Prometheus
